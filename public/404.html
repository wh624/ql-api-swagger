<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>Redirecting...</title>
  <script>
    // SPA fallback for GitHub Pages: redirect all 404s to index.html
    var path = window.location.pathname;
    var base = '/test1111';
    var search = window.location.search;
    var hash = window.location.hash;
    var target = base + '/' + path.replace(/^\/+/, '') + search + hash;
    // Avoid infinite loop if already at index.html
    if (!path.endsWith('index.html') && !path.endsWith('.js') && !path.endsWith('.css') && !path.endsWith('.svg') && !path.endsWith('.json')) {
      window.location.replace(base + '/index.html' + search + hash);
    }
  </script>
  <meta http-equiv="refresh" content="0;url=/test1111/index.html" />
</head>
<body>
  <p>Redirecting to <a href="/test1111/index.html">青龙面板 API 文档</a>...</p>
</body>
</html>
